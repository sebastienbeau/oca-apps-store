# Build the container
build:
  stage: build
  script:
    - git submodule init
    - git submodule update
    - docker compose build --pull

# Drop the database to restart from a fresh one
refresh_copy_db:
  stage: refresh
  script:
    - docker compose kill
    - dropdb --force --if-exists $BUILD_NAME
    - createdb $BUILD_NAME -T ${CI_PROJECT_NAME/-/_}_template
  rules:
    # if keepdb tag is set this job will not run
    - if: $CI_MERGE_REQUEST_LABELS !~ /keepdb/ && $CI_MERGE_REQUEST_LABELS =~ /deploy-payload/

# Run the container used for the review
review:
  stage: review
  script:
    - echo "DB_NAME=$BUILD_NAME" >> .env
    - docker compose kill
    - docker compose up -d
  environment:
    name: test/${CI_PROJECT_NAME}_${CI_MERGE_REQUEST_IID}
    url: https://${CI_PROJECT_NAME}_${CI_MERGE_REQUEST_IID}nuxt.${CI_DOMAIN}
    on_stop: stop_review
  rules:
    - if: $IS_MR == "true"

# Stop the container used for the review
stop_review:
  stage: review
  script:
    - docker compose down --rmi local --volumes
    - dropdb ${CI_PROJECT_NAME}_${CI_MERGE_REQUEST_IID} --if-exist
    - dropdb ${CI_PROJECT_NAME}_${CI_MERGE_REQUEST_IID}_test --if-exist
  environment:
    name: test/${CI_PROJECT_NAME}_${CI_MERGE_REQUEST_IID}
    action: stop
  when: manual
  rules:
    - if: $IS_MR == "true"

# Start the preprod container
review_preprod:
  stage: review_preprod
  script:
    - echo "DB_NAME=$BUILD_NAME" >> .env
    - echo "DOMAIN=${CI_PROJECT_NAME}_preprod.${CI_DOMAIN}"
    - echo "DOMAIN=${CI_PROJECT_NAME}_preprod.${CI_DOMAIN}" >> .env
    - docker compose kill
    - docker compose up -d
  environment:
    name: preprod
    url: https://${CI_PROJECT_NAME}_preprodnuxt.${CI_DOMAIN}
  rules:
    - if: $IS_MR == null

# Send the docker image to the registry in order to be downloaded in prod
docker_push:
  stage: docker_push
  script:
    - export TAG="${CI_COMMIT_MESSAGE//Release /}"
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker tag ${BUILD_NAME}_nuxt $CI_REGISTRY_IMAGE/nuxt:latest
    - docker push $CI_REGISTRY_IMAGE/nuxt:latest
    - docker tag ${BUILD_NAME}_nuxt $CI_REGISTRY_IMAGE/nuxt:$TAG
    - docker push $CI_REGISTRY_IMAGE/nuxt:$TAG
    - docker tag ${BUILD_NAME}_payload $CI_REGISTRY_IMAGE/payload:latest
    - docker push $CI_REGISTRY_IMAGE/payload:latest
    - docker tag ${BUILD_NAME}_payload $CI_REGISTRY_IMAGE/payload:$TAG
    - docker push $CI_REGISTRY_IMAGE/payload:$TAG
  rules:
    - if: $CI_COMMIT_TITLE =~ /^Release/ && $IS_MR == null

# Delete the data associated with the stopped containers
# Runs automatically every night
prune_docker:
  stage: maintenance
  script:
    - docker system prune --all --volumes --force
  when: manual
  rules:
    - if: $IS_MR == null
