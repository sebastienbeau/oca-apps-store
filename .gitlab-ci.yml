#a revoir tous les points payload et elastic

# Variables to be set on group / project in gitlab variables:

# CI_DOMAIN
# CI_TOOLS_REPOSITORY_URL
# SENTRY_DSN

workflow:
  # Only run the pipeline if this is the default branch or a MR
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      variables:
        PIPELINE_NAME: "MR pipeline: $CI_COMMIT_BRANCH"
        IS_MR: "true"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      variables:
        PIPELINE_NAME: "default branch pipeline: $CI_COMMIT_BRANCH"
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        PIPELINE_NAME: "main branch pipeline: $CI_COMMIT_BRANCH"

stages:
  - maintenance
  - lint
  - build
  - refresh
  - migrate
  - review
  - stop_review
  - review_preprod
  - docker_push

before_script:
  - export DOCKER_BUILDKIT=1
  - export TYPESENS_INDEX_PREFIX=ocastore
  - ./bin/extract_mr_variable_env.py
  - cat mr_variable.sh
  - source mr_variable.sh
  - cp .env-ci .env
  - export BUILD_NAME=${CI_PROJECT_NAME/-/_}_${CI_MERGE_REQUEST_IID:-preprod}
  - export CI_DOMAIN=${CI_DOMAIN}
  - |
    if [[ "$CI_MERGE_REQUEST_LABELS" == *"deploy-payload"* ]] || [[ "$CI_COMMIT_BRANCH == 'main'" ]]; then
      export COMPOSE_FILE="ci.docker-compose.yml:payload.docker-compose.yml:ci-payload.docker-compose.yml:secrets.docker-compose.yml"
      export NUXT_PUBLIC_PAYLOAD_URL="https://${CI_PROJECT_NAME}_${CI_MERGE_REQUEST_IID:-preprod}nuxt.ci-akretion.com"
      export NUXT_PAYLOAD_URL="http://payload:1337"
    else
      export COMPOSE_FILE="ci.docker-compose.yml"
      export NUXT_PUBLIC_PAYLOAD_URL="https://akretion.com"
    fi
  - |
    cat << EOF >> .env
    UID=`id -u`
    BUILD_NAME=${BUILD_NAME}
    COMPOSE_FILE=${COMPOSE_FILE}
    COMPOSE_PROJECT_NAME=${BUILD_NAME}
    NUXT_PUBLIC_PAYLOAD_URL=${NUXT_PUBLIC_PAYLOAD_URL}
    NUXT_PAYLOAD_URL=${NUXT_PAYLOAD_URL}
    PGDATABASE=${BUILD_NAME}
    DB_NAME=${BUILD_NAME}
    CI_DOMAIN=${CI_DOMAIN}
    BASE_DOMAIN_NAME=${CI_PROJECT_NAME}_${CI_MERGE_REQUEST_IID:-preprod}
    EOF
  - sops -d secrets.docker-compose.enc.yml > secrets.docker-compose.yml

