networks:
  local:
  traefik:
    external: true

services:
  nuxt:
    build: nuxt
    environment:
      NUXT_PUBLIC_SEARCH_URL: https://dev-typesense.akretion.com
      NUXT_PUBLIC_SEARCH_INDICES_COMPANIES_EN: ocastore_companies
      NUXT_PUBLIC_SEARCH_INDICES_PERSONS_EN: ocastore_persons
      NUXT_PUBLIC_SEARCH_INDICES_MODULES_EN: ocastore_modules
      NUXT_PUBLIC_SEARCH_INDICES_CATEGORIES_EN: ocastore_categories
    networks:
      - local
      - traefik
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=traefik'
      - 'traefik.http.routers.${COMPOSE_PROJECT_NAME}_nuxt.rule=Host(`${NUXT_DOMAIN}`)'
      - 'traefik.http.routers.${COMPOSE_PROJECT_NAME}_nuxt.tls=false'
      - 'traefik.http.routers.${COMPOSE_PROJECT_NAME}_nuxt.service=${COMPOSE_PROJECT_NAME}_nuxt'
      - 'traefik.http.services.${COMPOSE_PROJECT_NAME}_nuxt.loadbalancer.server.port=3000'
      - 'traefik.http.routers.${COMPOSE_PROJECT_NAME}_nuxt.middlewares=${COMPOSE_PROJECT_NAME}_nuxt'
      - 'traefik.http.middlewares.${COMPOSE_PROJECT_NAME}_nuxt.headers.customrequestheaders.X-Forwarded-Proto=http'
    ports:
      - 3000:3000
